<!DOCTYPE html>
<html>
<head>
  <title>AITrackStocks Login</title>
  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f9f9f9;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      text-align: center;
    }
    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
    }
    button {
      width: 100%;
      padding: 12px;
      background: green;
      color: white;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>AITrackStocks</h2>
  <p>Private Beta Access</p>

  <input type="email" placeholder="Enter your email">
  <input type="password" placeholder="Enter your password">

  <button>Access Platform</button>
</div>

</body>
</html>
