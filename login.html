<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AITrackStocks - Login</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              green: '#00C805',
              red: '#FF5000',
              black: '#000000',
              gray: '#5D6C78',
              lightgray: '#8F9AA3',
              bg: '#F5F8FA',
              border: '#E3E9ED'
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
    * { font-family: 'Inter', sans-serif; }
    .safe-bottom { padding-bottom: env(safe-area-inset-bottom, 20px); }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
    }
    .float { animation: float 3s ease-in-out infinite; }
    @keyframes pulse-glow {
      0%, 100% { box-shadow: 0 0 20px rgba(0, 200, 5, 0.3); }
      50% { box-shadow: 0 0 40px rgba(0, 200, 5, 0.6); }
    }
    .pulse-glow { animation: pulse-glow 2s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-gray-900 via-gray-800 to-black min-h-screen flex items-center justify-center p-4">
  <div id="app"></div>
  
  <script>
    // Backend API URL
    const API_URL = 'https://aitrackstocks-backend-production.up.railway.app';
    
    const state = {
      accessCode: '',
      error: '',
      isLoading: false,
      validCodes: ['BETA2024', 'FOUNDER', 'VIPACCESS', 'ALPHA', 'TEST123']
    };

    function checkCode() {
      state.isLoading = true;
      state.error = '';
      render();
      
      setTimeout(() => {
        if (state.validCodes.includes(state.accessCode.toUpperCase())) {
          localStorage.setItem('aistock_access', 'granted');
          localStorage.setItem('aistock_code', state.accessCode.toUpperCase());
          window.location.href = 'index.html';
        } else {
          state.isLoading = false;
          state.error = 'Invalid access code. Please try again.';
          render();
        }
      }, 800);
    }

    function render() {
      const app = document.getElementById('app');
      
      app.innerHTML = `
        <div class="w-full max-w-md">
          <!-- Logo Section -->
          <div class="text-center mb-8">
            <div class="w-24 h-24 bg-gradient-to-br from-brand-green to-green-600 rounded-3xl flex items-center justify-center mx-auto mb-6 float pulse-glow">
              <i data-lucide="trending-up" class="w-12 h-12 text-white"></i>
            </div>
            <h1 class="text-3xl font-bold text-white mb-2">AITrackStocks</h1>
            <p class="text-gray-400">Private Beta Access</p>
          </div>

          <!-- Access Code Card -->
          <div class="bg-white/10 backdrop-blur-xl rounded-3xl p-8 border border-white/20">
            <div class="text-center mb-6">
              <div class="w-12 h-12 bg-brand-green/20 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="lock" class="w-6 h-6 text-brand-green"></i>
              </div>
              <h2 class="text-xl font-bold text-white mb-2">Enter Access Code</h2>
              <p class="text-sm text-gray-400">This platform is currently in private beta</p>
            </div>

            <div class="space-y-4">
              <div class="relative">
                <input 
                  type="text" 
                  value="${state.accessCode}"
                  oninput="state.accessCode=this.value;state.error=''"
                  placeholder="Enter code (e.g., BETA2024)"
                  class="w-full px-4 py-4 bg-white/5 border border-white/20 rounded-xl text-white placeholder-gray-500 focus:outline-none focus:border-brand-green text-center text-lg tracking-wider uppercase font-semibold transition-colors"
                  ${state.isLoading ? 'disabled' : ''}
                >
              </div>
              
              ${state.error ? `
                <div class="flex items-center gap-2 text-brand-red text-sm bg-brand-red/10 p-3 rounded-xl">
                  <i data-lucide="alert-circle" class="w-4 h-4"></i>
                  ${state.error}
                </div>
              ` : ''}

              <button 
                onclick="checkCode()"
                disabled="${state.isLoading || !state.accessCode}"
                class="w-full bg-brand-green text-white font-semibold py-4 rounded-xl hover:bg-green-600 transition-all disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
              >
                ${state.isLoading ? `
                  <div class="w-5 h-5 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                  Verifying...
                ` : `
                  <span>Continue</span>
                  <i data-lucide="arrow-right" class="w-5 h-5"></i>
                `}
              </button>
            </div>

            <div class="mt-6 text-center">
              <p class="text-xs text-gray-500">
                Don't have a code? <a href="#" class="text-brand-green hover:underline">Request access</a>
              </p>
            </div>
          </div>

          <!-- Features -->
          <div class="mt-8 grid grid-cols-3 gap-4 text-center">
            <div class="text-gray-400">
              <i data-lucide="brain" class="w-6 h-6 mx-auto mb-2 text-brand-green"></i>
              <p class="text-xs">AI Powered</p>
            </div>
            <div class="text-gray-400">
              <i data-lucide="shield" class="w-6 h-6 mx-auto mb-2 text-brand-green"></i>
              <p class="text-xs">Secure</p>
            </div>
            <div class="text-gray-400">
              <i data-lucide="zap" class="w-6 h-6 mx-auto mb-2 text-brand-green"></i>
              <p class="text-xs">Real-time</p>
            </div>
          </div>
        </div>
      `;
      
      lucide.createIcons();
    }

    render();
  </script>
</body>
</html>
